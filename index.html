<meta charset="utf-8">
<title>Narozeninový kvíz</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<style>
  :root {
    --bg: #1b1730;
    --bg-deep: #141126;
    --card: #262041;
    --card-edge: #37305c;
    --ink: #f3edde;
    --ink-dim: #a89fc4;
    --gold: #ffb84d;
    --gold-soft: rgba(255, 184, 77, .16);
    --good: #6fd08c;
    --bad: #e96a6a;
    --radius: 18px;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: radial-gradient(120% 90% at 50% 0%, #241d42 0%, var(--bg) 45%, var(--bg-deep) 100%);
    color: var(--ink);
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    min-height: 100dvh;
    display: flex;
    justify-content: center;
  }
  .app {
    width: 100%;
    max-width: 440px;
    padding: 20px 16px 40px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  header { text-align: center; padding-top: 6px; }
  .eyebrow {
    font-size: 11px;
    letter-spacing: .22em;
    text-transform: uppercase;
    color: var(--gold);
    margin: 0 0 6px;
  }
  h1 {
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -.01em;
    margin: 0;
    text-wrap: balance;
  }
  .sub { color: var(--ink-dim); font-size: 14px; margin: 6px 0 0; }

  /* ===== Obrázková deska ===== */
  .board {
    position: relative;
    border-radius: var(--radius);
    overflow: hidden;
    aspect-ratio: 704 / 655;
    box-shadow: 0 10px 40px rgba(0,0,0,.45), 0 0 0 1px var(--card-edge);
  }
  .board svg, .board img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
    object-fit: cover;
  }
  .tiles {
    position: absolute;
    inset: 0;
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    grid-template-rows: repeat(4, 1fr);
  }
  .tile {
    background: linear-gradient(145deg, #2c2550, #1e1938);
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.05);
    display: grid;
    place-items: center;
    color: rgba(255,255,255,.14);
    font-size: 15px;
    transition: opacity .7s ease, transform .7s ease;
  }
  .tile.open {
    opacity: 0;
    transform: scale(1.15);
    pointer-events: none;
  }
  @media (prefers-reduced-motion: reduce) {
    .tile { transition: opacity .2s linear; }
    .tile.open { transform: none; }
    .card.shake { animation: none !important; }
  }

  /* ===== Postup ===== */
  .progress { display: flex; justify-content: center; gap: 8px; }
  .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--card-edge);
    transition: background .3s;
  }
  .dot.done { background: var(--gold); }
  .dot.now { box-shadow: 0 0 0 3px var(--gold-soft); background: var(--ink-dim); }

  /* ===== Otázka ===== */
  .card {
    background: var(--card);
    border: 1px solid var(--card-edge);
    border-radius: var(--radius);
    padding: 20px 18px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .q-label { font-size: 11px; letter-spacing: .18em; text-transform: uppercase; color: var(--ink-dim); margin: 0; }
  .q-text { font-size: 19px; font-weight: 700; margin: 0; line-height: 1.35; text-wrap: balance; }

  .choices { display: flex; flex-direction: column; gap: 10px; }
  .choice {
    font-size: 16px;
    font-weight: 600;
    text-align: left;
    padding: 13px 15px;
    border-radius: 12px;
    border: 1px solid var(--card-edge);
    background: var(--bg-deep);
    color: var(--ink);
    cursor: pointer;
    line-height: 1.3;
  }
  .choice:active { transform: translateY(1px); }
  .choice:focus-visible { outline: 3px solid var(--gold-soft); outline-offset: 2px; }
  .choice.good { border-color: var(--good); background: rgba(111, 208, 140, .12); }
  .choice.bad { border-color: var(--bad); background: rgba(233, 106, 106, .12); }

  .hint { font-size: 14px; color: var(--ink-dim); margin: 0; min-height: 20px; }
  .hint.good { color: var(--good); }
  .hint.bad { color: var(--bad); }

  .card.shake { animation: shake .4s; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-7px); }
    75% { transform: translateX(7px); }
  }

  /* ===== Finále ===== */
  .finale { text-align: center; display: none; }
  .finale.show { display: block; }
  .finale h2 { font-size: 26px; margin: 0 0 6px; color: var(--gold); }
  .finale p { color: var(--ink-dim); margin: 0; font-size: 15px; }
</style>

      q: "Co vypouští brněnský orloj každý den v 11:00?",
      choices: ["Holuba", "Řidiče BMW", "Skleněnou kuličku"],
      correct: 2,
      roast: "Špatně. I když ten orloj stejně nikdo nechápe."
    },
    {
      q: "A poslední: jaké je nejlepší BMW?",
      choices: ["M5", "M8", "Žádné 😌"],
      correct: 2,
      roast: "No tak. Víš to. Cítíš to. Řekni to nahlas."
    },
  ];

  const GRID = 24; // 6 × 4 dílků
  const tilesEl = document.getElementById("tiles");
  const progressEl = document.getElementById("progress");
  const qLabel = document.getElementById("qLabel");
  const qText = document.getElementById("qText");
  const choicesEl = document.getElementById("choices");
  const hintEl = document.getElementById("hint");
  const card = document.getElementById("card");
  const finale = document.getElementById("finale");

  // dílky + náhodné pořadí odkrývání
  const order = [];
  for (let i = 0; i < GRID; i++) {
    const t = document.createElement("div");
    t.className = "tile";
    t.textContent = "?";
    tilesEl.appendChild(t);
    order.push(i);
  }
  for (let i = order.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [order[i], order[j]] = [order[j], order[i]];
  }

  QUESTIONS.forEach(() => {
    const d = document.createElement("div");
    d.className = "dot";
    progressEl.appendChild(d);
  });
  const dots = [...progressEl.children];

  let current = 0;
  let revealed = 0;
  let locked = false;

  function showQuestion() {
    locked = false;
    qLabel.textContent = `Otázka ${current + 1} z ${QUESTIONS.length}`;
    qText.textContent = QUESTIONS[current].q;
    dots.forEach((d, i) => {
      d.className = "dot" + (i < current ? " done" : i === current ? " now" : "");
    });
    hintEl.textContent = "";
    hintEl.className = "hint";
    choicesEl.innerHTML = "";
    QUESTIONS[current].choices.forEach((text, idx) => {
      const b = document.createElement("button");
      b.className = "choice";
      b.textContent = text;
      b.addEventListener("click", () => pick(idx, b));
      choicesEl.appendChild(b);
    });
  }

  function revealBatch() {
    const target = Math.round((current / QUESTIONS.length) * GRID);
    let delay = 0;
    while (revealed < target) {
      const tile = tilesEl.children[order[revealed]];
      setTimeout(() => tile.classList.add("open"), delay);
      delay += 120;
      revealed++;
    }
  }

  function pick(idx, btn) {
    if (locked) return;
    const item = QUESTIONS[current];
    if (idx === item.correct) {
      locked = true;
      btn.classList.add("good");
      current++;
      revealBatch();
      if (current === QUESTIONS.length) {
        dots.forEach(d => d.className = "dot done");
        setTimeout(() => {
          card.style.display = "none";
          finale.classList.add("show");
        }, 900);
      } else {
        hintEl.textContent = "Správně! ✨";
        hintEl.className = "hint good";
        setTimeout(showQuestion, 900);
      }
    } else {
      btn.classList.add("bad");
      hintEl.textContent = item.roast;
      hintEl.className = "hint bad";
      card.classList.remove("shake");
      void card.offsetWidth;
      card.classList.add("shake");
      setTimeout(() => btn.classList.remove("bad"), 900);
    }
  }

  showQuestion();
</script>
